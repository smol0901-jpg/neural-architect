<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURAL ARCHITECT | Neural Core v2.1</title>
  <style>
    :root { --cyan: #06b6d4; --purple: #a855f7; --bg: #0a0a0a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; overflow: hidden; min-height: 100vh; }
    #canvas-bg, #canvas-particles, #canvas-core { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #canvas-bg { z-index: 1; opacity: 0.3; }
    #canvas-particles { z-index: 2; }
    #canvas-core { z-index: 3; }
    .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    h1 { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; text-align: center; background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .line { width: 200px; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent); margin-top: 20px; }
    .subtitle { margin-top: 12px; color: #9ca3af; }
    .status-panel { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .badge { padding: 8px 16px; border-radius: 20px; font-size: 14px; background: rgba(6, 182, 212, 0.15); border: 1px solid var(--cyan); color: var(--cyan); }
    .badge.active { background: rgba(168, 85, 247, 0.25); border-color: var(--purple); animation: glow 1.5s infinite; }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(168,85,247,0.3); } 50% { box-shadow: 0 0 20px rgba(168,85,247,0.6); } }
    .controls { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn { padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; }
    .btn-primary { background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #fff; box-shadow: 0 4px 20px rgba(6,182,212,0.3); }
    .btn-primary:hover { transform: scale(1.05); }
    .btn-secondary { background: transparent; border: 2px solid var(--cyan); color: var(--cyan); }
    .btn-secondary:hover { background: rgba(6,182,212,0.15); }
    .hint { margin-top: 20px; color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  <canvas id="canvas-particles"></canvas>
  <canvas id="canvas-core"></canvas>
  
  <div class="container">
    <h1>NEURAL<br>ARCHITECT</h1>
    <div class="line"></div>
    <p class="subtitle">Neural Core v2.1</p>
    
    <div class="status-panel">
      <div class="badge" id="ai-state">🧠 AI: idle</div>
      <div class="badge" id="focus-status">👁️ Focus: off</div>
    </div>
    
    <div class="controls">
      <button class="btn btn-primary" id="btn-think">🧠 Think</button>
      <button class="btn btn-secondary" id="btn-focus">🎯 Focus</button>
      <button class="btn btn-secondary" id="btn-reset">↺ Reset</button>
    </div>
    
    <p class="hint">Move cursor to interact • Click buttons</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const CONFIG = { shape: params.get('shape')||'icosahedron', color: params.get('color')||'#06b6d4', particles: parseInt(params.get('particles'))||3000, speed: parseFloat(params.get('speed'))||1 };
    const AI_STATES = { IDLE:'idle', THINKING:'thinking', FOCUSED:'focused', PROCESSING:'processing', RESTING:'resting' };
    let currentState = AI_STATES.IDLE, mouse = { x:0, y:0, tx:0, ty:0 }, time = 0;
    
    // BG
    const bgC = document.getElementById('canvas-bg'), bgCtx = bgC.getContext('2d');
    let bgStars = [];
    function initBg() { bgC.width=window.innerWidth; bgC.height=window.innerHeight; bgStars=[]; for(let i=0;i<200;i++) bgStars.push({x:Math.random()*bgC.width, y:Math.random()*bgC.height, s:Math.random()*1.5, a:Math.random()}); }
    function renderBg() { bgCtx.clearRect(0,0,bgC.width,bgC.height); const px=mouse.x*15, py=mouse.y*15; bgStars.forEach(s=>{ bgCtx.beginPath(); bgCtx.arc((s.x+px*0.3)%bgC.width,(s.y+py*0.3)%bgC.height,s.s,0,Math.PI*2); bgCtx.fillStyle=`rgba(168,85,247,${s.a*0.5})`; bgCtx.fill(); }); }
    
    // Particles
    const pC = document.getElementById('canvas-particles'), pCtx = pC.getContext('2d');
    let particles = [];
    function initP() { pC.width=window.innerWidth; pC.height=window.innerHeight; particles=[]; for(let i=0;i<CONFIG.particles;i++) particles.push({x:Math.random()*pC.width, y:Math.random()*pC.height, z:Math.random()*1000, bs:Math.random()*2+1}); }
    function renderP() { pCtx.clearRect(0,0,pC.width,pC.height); const px=mouse.x*30, py=mouse.y*30; let pulse=currentState==='processing'?2:currentState==='thinking'?1.5:1; particles.forEach(p=>{ const x=(p.x+px*0.6)%pC.width, y=(p.y+py*0.6)%pC.height, d=(p.z+500)/1000, s=p.bs*d*pulse, al=d*0.6; let c=CONFIG.color; if(currentState==='thinking')c='#a855f7'; if(currentState==='processing')c='#f472b6'; const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16); pCtx.beginPath(); pCtx.arc(x,y,s,0,Math.PI*2); pCtx.fillStyle=`rgba(${r},${g},${b},${al})`; pCtx.fill(); }); }
    
    // Three.js
    const cC = document.getElementById('canvas-core');
    let scene, camera, renderer, core, wires;
    function initThree() {
      scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000); camera.position.z = 5;
      renderer = new THREE.WebGLRenderer({ canvas: cC, alpha: true, antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
      let geo = CONFIG.shape==='torus'?new THREE.TorusGeometry(1.2,0.4,16,100):CONFIG.shape==='sphere'?new THREE.SphereGeometry(1.5,32,32):new THREE.IcosahedronGeometry(1.5,1);
      core = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: CONFIG.color, wireframe: true, transparent: true, opacity: 0.8 })); scene.add(core);
      wires = new THREE.Mesh(new THREE.IcosahedronGeometry(2,1), new THREE.MeshBasicMaterial({ color: 0xa855f7, wireframe: true, transparent: true, opacity: 0.3 })); scene.add(wires);
    }
    function renderThree() {
      time += 0.01*CONFIG.speed; mouse.x+=(mouse.tx-mouse.x)*0.05; mouse.y+=(mouse.ty-mouse.y)*0.05;
      const rs = currentState==='focused'?2:1;
      core.rotation.x += 0.005*rs*CONFIG.speed; core.rotation.y += 0.008*rs*CONFIG.speed;
      core.position.x = mouse.x*0.5; core.position.y = -mouse.y*0.5;
      let sc = 1;
      if(currentState==='thinking') sc = 1+Math.sin(time*3)*0.1;
      if(currentState==='processing') sc = 1+Math.sin(time*8)*0.15;
      if(currentState==='resting') sc = 1+Math.sin(time*0.5)*0.05;
      core.scale.setScalar(sc); wires.scale.setScalar(sc*1.3); wires.rotation.x-=0.003; wires.rotation.y+=0.002;
      if(currentState==='thinking') core.material.color.setHex(0xa855f7); else if(currentState==='processing') core.material.color.setHex(0xf472b6); else core.material.color.set(CONFIG.color);
      renderer.render(scene, camera);
    }
    
    function updateUI() {
      const emojis = { idle:'🧠', thinking:'💭', focused:'🎯', processing:'⚡', resting:'😌' };
      const texts = { idle:'Idle', thinking:'Thinking...', focused:'Focused', processing:'Processing', resting:'Resting' };
      document.getElementById('ai-state').textContent = emojis[currentState]+' AI: '+texts[currentState];
      document.getElementById('ai-state').classList.toggle('active', currentState==='thinking'||currentState==='processing');
      document.getElementById('focus-status').textContent = core&&(core.position.x!==0||core.position.y!==0)?'👁️ Focus: on':'👁️ Focus: off';
    }
    
    document.addEventListener('mousemove', e=>{ mouse.tx=(e.clientX/window.innerWidth-0.5)*2; mouse.ty=(e.clientY/window.innerHeight-0.5)*2; });
    window.addEventListener('resize', ()=>{ bgC.width=pC.width=window.innerWidth; bgC.height=pC.height=window.innerHeight; if(renderer){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); }});
    
    window.NeuralCore = {
      setState: s=>{ if(AI_STATES[s.toUpperCase()]){ currentState=AI_STATES[s.toUpperCase()]; updateUI(); }}, getState:()=>currentState, config: CONFIG,
      triggerThink: ()=>{ currentState='thinking'; setTimeout(()=>currentState='processing',2000); setTimeout(()=>currentState='resting',4000); setTimeout(()=>currentState='idle',6000); updateUI(); },
      triggerFocus: ()=>{ currentState='focused'; setTimeout(()=>currentState='idle',3000); updateUI(); }
    };
    
    document.getElementById('btn-think').onclick = ()=>NeuralCore.triggerThink();
    document.getElementById('btn-focus').onclick = ()=>NeuralCore.triggerFocus();
    document.getElementById('btn-reset').onclick = ()=>{ currentState='idle'; mouse.x=mouse.tx=0; mouse.y=mouse.ty=0; updateUI(); };
    
    initBg(); initP(); initThree(); updateUI();
    function loop(){ renderBg(); renderP(); renderThree(); updateUI(); requestAnimationFrame(loop); }
    loop(); console.log('Neural Core v2.1 ready');
  </script>
</body>
</html>
