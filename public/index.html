<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURAL ARCHITECT PREMIUM++ | Visual Render</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neural-cyan: #06b6d4;
      --neural-purple: #a855f7;
      --neural-dark: #0a0a0a;
    }

    body {
      background: var(--neural-dark);
      color: white;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Canvas background */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Neural Title */
    .neural-title {
      text-align: center;
    }

    .neural-title h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .neural-title .gradient-text {
      background: linear-gradient(135deg, var(--neural-cyan), var(--neural-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .neural-title .white-text {
      color: white;
    }

    .premium-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .premium-line .premium-text {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--neural-cyan), var(--neural-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .premium-line .plus-plus {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--neural-cyan);
    }

    /* Neural line */
    .neural-line {
      width: 250px;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent, 
        var(--neural-cyan), 
        var(--neural-purple), 
        transparent
      );
      margin-top: 24px;
      animation: neural-pulse 2s ease-in-out infinite;
    }

    @keyframes neural-pulse {
      0%, 100% {
        opacity: 0.5;
        transform: scaleX(0.8);
      }
      50% {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    /* Subtitle */
    .subtitle {
      margin-top: 16px;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #9ca3af;
      font-weight: 500;
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 48px;
    }

    @media (min-width: 640px) {
      .buttons {
        flex-direction: row;
      }
    }

    .btn {
      padding: 16px 32px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--neural-cyan), var(--neural-purple));
      color: white;
      box-shadow: 0 4px 24px rgba(6, 182, 212, 0.25);
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 32px rgba(6, 182, 212, 0.35);
    }

    .btn-primary:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(6, 182, 212, 0.5);
      color: var(--neural-cyan);
    }

    .btn-secondary:hover {
      border-color: var(--neural-cyan);
      background: rgba(6, 182, 212, 0.1);
      transform: scale(1.05);
    }

    .btn-secondary:active {
      transform: scale(0.95);
    }

    /* Glitch effect */
    .glitch {
      animation: glitch 0.2s ease-in-out;
    }

    @keyframes glitch {
      0%, 100% {
        transform: translate(0);
        filter: blur(0);
      }
      20% {
        transform: translate(-2px, 2px);
        filter: blur(1px);
      }
      40% {
        transform: translate(2px, -2px);
        filter: blur(0.5px);
      }
      60% {
        transform: translate(-1px, -1px);
        filter: blur(1.5px);
      }
      80% {
        transform: translate(1px, 1px);
        filter: blur(0.5px);
      }
    }

    /* Status badge */
    .status {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid var(--neural-cyan);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--neural-cyan);
      z-index: 100;
    }

    .status::before {
      content: '●';
      margin-right: 8px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  
  <div class="status">NeuralCore Active</div>
  
  <div class="container">
    <div class="neural-title">
      <h1 id="title-neural">
        <span class="gradient-text">NEURAL</span>
      </h1>
      <h1 id="title-architect">
        <span class="white-text">ARCHITECT</span>
      </h1>
      <div class="premium-line">
        <span class="premium-text">PREMIUM</span>
        <span class="plus-plus">++</span>
      </div>
      <div class="neural-line"></div>
      <p class="subtitle">NEXT-GEN SITE ENGINE</p>
    </div>

    <div class="buttons">
      <button class="btn btn-primary" onclick="activateCore()">
        Создать новый проект
      </button>
      <button class="btn btn-secondary">
        Посмотреть примеры
      </button>
    </div>
  </div>

  <script>
    // Neural Glitch Effect
    let glitchActive = false;
    
    function triggerGlitch() {
      if (glitchActive) return;
      glitchActive = true;
      
      const titleNeural = document.getElementById('title-neural');
      const titleArchitect = document.getElementById('title-architect');
      
      titleNeural.classList.add('glitch');
      titleArchitect.classList.add('glitch');
      
      setTimeout(() => {
        titleNeural.classList.remove('glitch');
        titleArchitect.classList.remove('glitch');
        glitchActive = false;
      }, 200);
    }

    // Glitch every 4 seconds
    setInterval(triggerGlitch, 4000);

    // Particles Canvas
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Particle class
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 2 + 1;
        this.opacity = Math.random() * 0.5 + 0.1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(6, 182, 212, ${this.opacity})`;
        ctx.fill();
      }
    }

    // Create particles
    const particles = [];
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    // Connect particles
    function connectParticles() {
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach((p2) => {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 150) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(168, 85, 247, ${0.1 * (1 - dist / 150)})`;
            ctx.stroke();
          }
        });
      });
    }

    // Animation loop
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      connectParticles();
      requestAnimationFrame(animate);
    }

    animate();

    // Button action
    function activateCore() {
      alert('NeuralCore активирован! 🚀');
    }
  </script>
</body>
</html>
